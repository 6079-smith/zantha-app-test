name = "zantha-wishlist"
client_id = "7050bec4ea9d7ce28f5fc3e14fd3e9a7"
application_url = "https://web-production-7a9e1.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
scopes = "read_customer_events,read_customers,read_customer_merge,customer_read_customers,customer_read_metaobjects,customer_read_orders,unauthenticated_read_customers"

[auth]
redirect_urls = [
  "https://web-production-7a9e1.up.railway.app/auth/callback"
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

[app_proxy]
url = "https://web-production-7a9e1.up.railway.app/proxy"
subpath = "wishlist"
prefix = "a"
