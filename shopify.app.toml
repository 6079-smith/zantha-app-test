  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

[app_proxy]
url = "https://web-production-8bfc7.up.railway.app/proxy"
subpath = "message"
prefix = "a"
