name = "zantha-app-test"
client_id = "7050bec4ea9d7ce28f5fc3e14fd3e9a7"
application_url = "https://web-production-8bfc7.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
scopes = ""

[auth]
redirect_urls = [
  "https://web-production-8bfc7.up.railway.app/auth/callback"
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
